name: CI

on: 
    push: 
        branches: 
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop
    workflow_dispatch: 

jobs:
    test: 
        runs-on: ubuntu-latest

        steps:
            - name: Download code
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Run Ruff
              run: |
                ruff check .

            - name: Run tests
              run: |
                pytest
    
    docker-build: 
        runs-on: ubuntu-latest
        needs: test

        steps:
          - name: Download code
            uses: actions/checkout@v2

          - name: Build Docker image
            run: |
              docker build -t task-manager-api:latest .
